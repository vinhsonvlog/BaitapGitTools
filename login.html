<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-ink: #0c1d2b;
        --bg-deep: #08131c;
        --card-bg: rgba(247, 251, 250, 0.9);
        --text: #0f2330;
        --muted: #4b6070;
        --accent: #d96f3a;
        --accent-strong: #b44c1a;
        --line: rgba(15, 35, 48, 0.18);
        --ring: rgba(217, 111, 58, 0.22);
        --shadow: 0 24px 48px rgba(2, 12, 20, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Manrope", "Segoe UI", Tahoma, sans-serif;
        color: #edf4f9;
        background:
          radial-gradient(circle at 18% 20%, rgba(95, 181, 168, 0.35), transparent 46%),
          radial-gradient(circle at 84% 28%, rgba(217, 111, 58, 0.24), transparent 40%),
          linear-gradient(160deg, var(--bg-ink), var(--bg-deep));
        position: relative;
        overflow: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        filter: blur(2px);
        pointer-events: none;
      }

      body::before {
        width: 380px;
        height: 380px;
        left: -120px;
        bottom: -120px;
        border: 1px solid rgba(237, 244, 249, 0.18);
        animation: drift 14s ease-in-out infinite;
      }

      body::after {
        width: 250px;
        height: 250px;
        top: -80px;
        right: -70px;
        background: radial-gradient(circle, rgba(95, 181, 168, 0.34), transparent 65%);
        animation: drift 10s ease-in-out infinite reverse;
      }

      .login-wrap {
        width: min(96vw, 980px);
        display: grid;
        grid-template-columns: 1fr 420px;
        gap: 24px;
        align-items: stretch;
        position: relative;
        z-index: 1;
      }

      .intro {
        padding: 22px 8px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 16px;
        opacity: 0;
        transform: translateY(16px);
        animation: reveal 700ms ease forwards;
      }

      .eyebrow {
        margin: 0;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.74rem;
        font-weight: 700;
        color: rgba(237, 244, 249, 0.74);
      }

      .intro h1 {
        margin: 0;
        max-width: 13ch;
        font-family: "Fraunces", Georgia, serif;
        font-size: clamp(2rem, 4.8vw, 3.35rem);
        line-height: 1.05;
        letter-spacing: 0.01em;
      }

      .intro p {
        margin: 0;
        max-width: 36ch;
        color: rgba(237, 244, 249, 0.76);
        line-height: 1.6;
      }

      .login-card {
        width: 100%;
        padding: 30px;
        border-radius: 22px;
        background: var(--card-bg);
        backdrop-filter: blur(8px);
        box-shadow: var(--shadow);
        border: 1px solid rgba(255, 255, 255, 0.55);
        opacity: 0;
        transform: translateY(16px);
        animation: reveal 700ms ease 140ms forwards;
      }

      .login-card h2 {
        margin: 0 0 8px;
        font-size: 2rem;
        font-family: "Fraunces", Georgia, serif;
        color: var(--text);
        letter-spacing: 0.01em;
      }

      .login-card > p {
        margin: 0 0 22px;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--text);
      }

      input {
        width: 100%;
        margin-top: 6px;
        padding: 12px 13px;
        border: 1px solid var(--line);
        border-radius: 10px;
        font-size: 1rem;
        background: rgba(255, 255, 255, 0.88);
        transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      }

      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--ring);
        transform: translateY(-1px);
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 4px;
        font-size: 0.9rem;
      }

      .row a {
        color: var(--accent-strong);
        text-decoration: none;
        font-weight: 600;
      }

      .row a:hover {
        text-decoration: underline;
      }

      .remember {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
      }

      .remember input {
        width: 16px;
        height: 16px;
        margin: 0;
        accent-color: var(--accent);
      }

      button {
        margin-top: 6px;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 20px rgba(180, 76, 26, 0.28);
        filter: saturate(1.08);
      }

      .register {
        margin-top: 16px;
        text-align: center;
        font-size: 0.95rem;
        color: var(--muted);
      }

      .register a {
        color: var(--accent-strong);
        text-decoration: none;
        font-weight: 700;
      }

      .register a:hover {
        text-decoration: underline;
      }

      @keyframes reveal {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes drift {
        0%,
        100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(10px, -12px);
        }
      }

      @media (max-width: 900px) {
        body {
          padding: 20px;
        }

        .login-wrap {
          grid-template-columns: 1fr;
          gap: 16px;
          max-width: 460px;
        }

        .intro {
          padding: 0 4px;
          gap: 10px;
        }

        .intro h1 {
          max-width: 18ch;
        }
      }

      @media (max-width: 460px) {
        .login-card {
          padding: 24px 20px;
          border-radius: 18px;
        }

        .row {
          flex-direction: column;
          align-items: flex-start;
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <main class="login-wrap">
      <section class="intro">
        <p class="eyebrow">Secure Access</p>
        <h1>Pick up where your ideas left off.</h1>
        <p>
          Sign in to continue your workspace flow and keep everything synced in
          one place.
        </p>
      </section>

      <section class="login-card" aria-label="Login form">
        <h2>Welcome back</h2>
        <p>Sign in to continue.</p>

        <form action="#" method="post">
          <label>
            Email or phone number
            <input
              type="text"
              name="account"
              autocomplete="username"
              placeholder="you@example.com"
              required
            />
          </label>

          <label>
            Password
            <input
              type="password"
              name="password"
              autocomplete="current-password"
              placeholder="Enter your password"
              required
            />
          </label>

          <div class="row">
            <label class="remember">
              <input type="checkbox" name="remember" />
              Remember me
            </label>
            <a href="#">Forgot password?</a>
          </div>

          <button type="submit">Log in</button>
        </form>

        <p class="register">No account yet? <a href="#">Create one</a></p>
      </section>
    </main>
  </body>
</html>
